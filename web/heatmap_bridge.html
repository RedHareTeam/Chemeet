<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; font-family:"Noto Sans KR",-apple-system,"Apple SD Gothic Neo",system-ui,sans-serif; }
    body { width:100vw; height:100vh; overflow:hidden; }
    #map { width:100%; height:100%; }
    #canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2; }
    #pins  { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:4; }
    .pin { position:absolute; pointer-events:auto; cursor:pointer; display:flex; flex-direction:column; align-items:center; transform:translate(-50%,-100%); }
    .pin-circle { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column; color:white; box-shadow:0 3px 10px rgba(0,0,0,0.25); border:2.5px solid white; }
    .pin-count { font-size:15px; font-weight:700; line-height:1; }
    .pin-unit  { font-size:8px; opacity:0.85; margin-top:1px; }
    .pin-tail  { width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; margin-top:-1px; }
    .pin-label { background:rgba(28,28,46,0.72); color:white; font-size:10px; padding:2px 7px; border-radius:6px; margin-top:4px; max-width:96px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cpin { position:absolute; pointer-events:auto; cursor:pointer; display:flex; flex-direction:column; align-items:center; transform:translate(-50%,-50%); }
    .cpin-circle { border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column; color:white; border:3px solid white; box-shadow:0 3px 14px rgba(0,0,0,0.22); }
    .cpin-num  { font-weight:800; line-height:1; }
    .cpin-sub  { font-size:9px; opacity:0.85; }
    .cpin-badge { background:rgba(28,28,46,0.72); color:white; font-size:10px; padding:2px 8px; border-radius:6px; margin-top:5px; white-space:nowrap; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="pins"></div>
  <canvas id="canvas"></canvas>
  <script>
    var _appkey = new URLSearchParams(window.location.search).get('appkey') || '';
    ['MapReadyChannel','PinTappedChannel','Console'].forEach(function(ch) {
      window[ch] = { postMessage: function(d) { window.parent.postMessage({__channel:ch,__data:String(d)}, '*'); } };
    });
    window.addEventListener('message', function(e) {
      if (e.data && typeof e.data.__eval === 'string') { try { (0,eval)(e.data.__eval); } catch(ex) { console.error(ex); } }
    });

    var map;
    var canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d'), pinsDiv=document.getElementById('pins');
    var currentData=[], clusterTimer=null, pinch=null;

    (function() {
      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + _appkey + '&autoload=false';
      s.onload = function() {
        kakao.maps.load(function() {
          canvas.width=window.innerWidth; canvas.height=window.innerHeight;
          map = new kakao.maps.Map(document.getElementById('map'), { center:new kakao.maps.LatLng(37.5665,126.9780), level:8 });
          kakao.maps.event.addListener(map,'center_changed',function(){redrawHeatmap();updatePinPositions();});
          kakao.maps.event.addListener(map,'zoom_changed',function(){pinch=null;resetTransform();redrawHeatmap();if(clusterTimer)clearTimeout(clusterTimer);clusterTimer=setTimeout(function(){renderPins();redrawHeatmap();},120);});
          var mapEl=document.getElementById('map');
          mapEl.addEventListener('touchstart',function(e){if(e.touches.length===2)pinch={dist:tdist(e.touches[0],e.touches[1]),cx:(e.touches[0].clientX+e.touches[1].clientX)/2,cy:(e.touches[0].clientY+e.touches[1].clientY)/2};},{passive:true});
          mapEl.addEventListener('touchmove',function(e){if(e.touches.length===2&&pinch){var s=tdist(e.touches[0],e.touches[1])/pinch.dist,t='scale('+s+')',o=pinch.cx+'px '+pinch.cy+'px';canvas.style.transform=t;canvas.style.transformOrigin=o;pinsDiv.style.transform=t;pinsDiv.style.transformOrigin=o;}},{passive:true});
          MapReadyChannel.postMessage('ready');
        });
      };
      document.head.appendChild(s);
    })();

    function tdist(a,b){var dx=a.clientX-b.clientX,dy=a.clientY-b.clientY;return Math.sqrt(dx*dx+dy*dy);}
    function resetTransform(){canvas.style.transform=pinsDiv.style.transform='';canvas.style.transformOrigin=pinsDiv.style.transformOrigin='';}
    function updateMapData(data){currentData=data||[];clearPins();ctx.clearRect(0,0,canvas.width,canvas.height);if(!currentData.length)return;if(currentData.length===1){map.setCenter(new kakao.maps.LatLng(currentData[0].lat,currentData[0].lng));map.setLevel(4);}else{var b=new kakao.maps.LatLngBounds();currentData.forEach(function(p){b.extend(new kakao.maps.LatLng(p.lat,p.lng));});map.setBounds(b,80);}redrawHeatmap();renderPins();}
    function clearPins(){while(pinsDiv.firstChild)pinsDiv.removeChild(pinsDiv.firstChild);window._clusterData=[];}
    function updatePinPositions(){if(!currentData.length)return;var proj=map.getProjection(),els=pinsDiv.querySelectorAll('[data-lat]');els.forEach(function(el){var pt=proj.containerPointFromCoords(new kakao.maps.LatLng(parseFloat(el.dataset.lat),parseFloat(el.dataset.lng)));el.style.left=pt.x+'px';el.style.top=pt.y+'px';});}
    function redrawHeatmap(){ctx.clearRect(0,0,canvas.width,canvas.height);if(!currentData.length)return;var proj=map.getProjection(),level=map.getLevel(),clusterR=Math.max(35,level*9);var pts=currentData.map(function(p){var pt=proj.containerPointFromCoords(new kakao.maps.LatLng(p.lat,p.lng));return{x:pt.x,y:pt.y};});var used=new Array(pts.length).fill(false),spots=[];for(var a=0;a<pts.length;a++){if(used[a])continue;var cluster=[a];used[a]=true;for(var b=a+1;b<pts.length;b++){if(used[b])continue;var dx=pts[a].x-pts[b].x,dy=pts[a].y-pts[b].y;if(Math.sqrt(dx*dx+dy*dy)<clusterR){cluster.push(b);used[b]=true;}}var total=cluster.reduce(function(s,i){return s+currentData[i].count;},0);var cLat=cluster.reduce(function(s,i){return s+currentData[i].lat;},0)/cluster.length;var cLng=cluster.reduce(function(s,i){return s+currentData[i].lng;},0)/cluster.length;var cPt=proj.containerPointFromCoords(new kakao.maps.LatLng(cLat,cLng));spots.push({x:cPt.x,y:cPt.y,count:total});}spots.sort(function(a,b){return a.count-b.count;});spots.forEach(function(s){var r,alpha;if(s.count>=4){r=110;alpha=0.50;}else if(s.count>=2){r=85;alpha=0.40;}else{r=65;alpha=0.28;}var rgb=heatRgb(s.count);var g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,r);g.addColorStop(0,'rgba('+rgb+','+alpha+')');g.addColorStop(0.5,'rgba('+rgb+','+(alpha*0.38)+')');g.addColorStop(1,'rgba('+rgb+',0)');ctx.beginPath();ctx.arc(s.x,s.y,r,0,2*Math.PI);ctx.fillStyle=g;ctx.fill();});}
    function renderPins(){clearPins();if(!currentData.length)return;var proj=map.getProjection(),level=map.getLevel(),clusterR=Math.max(35,level*9);var pts=currentData.map(function(p){var pt=proj.containerPointFromCoords(new kakao.maps.LatLng(p.lat,p.lng));return{x:pt.x,y:pt.y};});var used=new Array(pts.length).fill(false);for(var a=0;a<pts.length;a++){if(used[a])continue;var cluster=[a];used[a]=true;for(var b=a+1;b<pts.length;b++){if(used[b])continue;var dx=pts[a].x-pts[b].x,dy=pts[a].y-pts[b].y;if(Math.sqrt(dx*dx+dy*dy)<clusterR){cluster.push(b);used[b]=true;}}if(cluster.length===1){addSinglePin(cluster[0],pts[cluster[0]]);}else{var cLat=cluster.reduce(function(s,i){return s+currentData[i].lat;},0)/cluster.length;var cLng=cluster.reduce(function(s,i){return s+currentData[i].lng;},0)/cluster.length;var cPt=proj.containerPointFromCoords(new kakao.maps.LatLng(cLat,cLng));addClusterPin(cLat,cLng,cPt,cluster);}}}
    function addSinglePin(idx,pt){var p=currentData[idx],color=pinColor(p.count),name10=Array.from(p.name).slice(0,10).join(''),label=Array.from(p.name).length>10?esc(name10)+'&#8230;':esc(p.name);var el=document.createElement('div');el.className='pin';el.dataset.lat=p.lat;el.dataset.lng=p.lng;el.style.left=pt.x+'px';el.style.top=pt.y+'px';el.innerHTML='<div class="pin-circle" style="background:'+color+'"><span class="pin-count">'+p.count+'</span><span class="pin-unit">&#54924;</span></div><div class="pin-tail" style="border-top:8px solid '+color+'"></div><div class="pin-label">'+label+'</div>';el.addEventListener('click',function(e){e.stopPropagation();onPinTap(idx);});pinsDiv.appendChild(el);}
    function addClusterPin(cLat,cLng,pt,clusterArr){var total=clusterArr.reduce(function(s,i){return s+currentData[i].count;},0),n=clusterArr.length,sz=Math.min(62,46+n*3),ci=window._clusterData.length;window._clusterData.push(clusterArr);var el=document.createElement('div');el.className='cpin';el.dataset.lat=cLat;el.dataset.lng=cLng;el.style.left=pt.x+'px';el.style.top=pt.y+'px';el.innerHTML='<div class="cpin-circle" style="width:'+sz+'px;height:'+sz+'px;background:'+pinColor(total)+'"><span class="cpin-num" style="font-size:'+Math.round(sz*0.36)+'px">'+n+'</span><span class="cpin-sub">&#44275;</span></div><div class="cpin-badge">'+total+'&#54924; &#48169;&#47928;</div>';el.addEventListener('click',function(e){e.stopPropagation();onClusterTap(ci);});pinsDiv.appendChild(el);}
    function onPinTap(idx){PinTappedChannel.postMessage(currentData[idx].name);}
    function onClusterTap(ci){var b=new kakao.maps.LatLngBounds();window._clusterData[ci].forEach(function(i){b.extend(new kakao.maps.LatLng(currentData[i].lat,currentData[i].lng));});map.setBounds(b,100);}
    function heatRgb(c){return c>=4?'255,95,126':c>=2?'124,58,237':'129,140,248';}
    function pinColor(c){return c>=4?'#FF5F7E':c>=2?'#7C3AED':'#818CF8';}
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}
  </script>
</body>
</html>
